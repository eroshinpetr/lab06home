name: Build solver packages

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build solver
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Configure
        run: |
          cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build _build --config Release

  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make rpm zip

      - name: Configure
        run: |
          cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build _build --config Release

      - name: Build packages
        run: |
          cpack --config _build/CPackConfig.cmake -G TGZ
          cpack --config _build/CPackConfig.cmake -G ZIP
          cpack --config _build/CPackConfig.cmake -G DEB
          cpack --config _build/CPackConfig.cmake -G RPM

      - name: Collect packages
        run: |
          mkdir -p artifacts
          cp _build/*.tar.gz artifacts/ 2>/dev/null || true
          cp _build/*.zip artifacts/ 2>/dev/null || true
          cp _build/*.deb artifacts/ 2>/dev/null || true
          cp _build/*.rpm artifacts/ 2>/dev/null || true
          ls -la artifacts

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: artifacts/*

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build _build --config Release

      - name: Build DMG package
        run: |
          cpack --config _build/CPackConfig.cmake -G DragNDrop

      - name: Collect packages
        run: |
          mkdir -p artifacts
          cp _build/*.dmg artifacts/ 2>/dev/null || true
          ls -la artifacts

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: artifacts/*

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install WiX
        shell: pwsh
        run: |
          choco install wixtoolset -y
          $wix = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter candle.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $wix) {
            throw "WiX candle.exe not found"
          }
          $wix.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: |
          cmake --build _build --config Release

      - name:
Build MSI package
        shell: pwsh
        run: |
          cpack --config _build/CPackConfig.cmake -C Release -G WIX

      - name: Collect packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "_build/*.msi" "artifacts/" -ErrorAction SilentlyContinue
          Get-ChildItem artifacts

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: artifacts/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package-linux
      - package-macos
      - package-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: |
          find release-assets -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
